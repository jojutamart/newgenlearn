<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎮 Roblox Word Quest</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Kanit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --rob-red: #E8292A;
  --rob-dark: #1B1B1B;
  --rob-grey: #2D2D2D;
  --rob-light: #3D3D3D;
  --rob-white: #F5F5F5;
  --rob-yellow: #FFD700;
  --rob-blue: #00A2FF;
  --rob-green: #00C853;
  --rob-orange: #FF6D00;
  --rob-purple: #B039D4;
  --pixel: 4px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Kanit', sans-serif;
  background: var(--rob-dark);
  min-height: 100vh;
  color: var(--rob-white);
  overflow-x: hidden;
}

/* ---- PIXEL GRID BG ---- */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 32px 32px;
  pointer-events: none; z-index: 0;
}

/* ---- FLOATING PIXEL BLOCKS ---- */
.pixel-floats { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
.pblock {
  position: absolute;
  border-radius: 4px;
  opacity: 0.18;
  animation: floatBlock linear infinite;
}
@keyframes floatBlock {
  0%   { transform: translateY(110vh) rotate(0deg); opacity: 0; }
  10%  { opacity: 0.18; }
  90%  { opacity: 0.18; }
  100% { transform: translateY(-80px) rotate(180deg); opacity: 0; }
}

/* ---- SCREENS ---- */
.screen { display: none; position: relative; z-index: 1; }
.screen.active { display: block; }

/* ---- PIXEL BUTTON STYLE ---- */
.px-btn {
  display: inline-block;
  border: none; cursor: pointer;
  font-family: 'Kanit', sans-serif;
  font-weight: 800;
  position: relative;
  border-radius: 6px;
  transition: transform .08s, filter .08s;
  user-select: none;
}
.px-btn:active { transform: translateY(3px) !important; filter: brightness(0.85); }

/* ---- HEADER ---- */
header {
  text-align: center;
  padding: 24px 16px 0;
  position: relative; z-index: 1;
}
.logo-wrap {
  display: inline-block;
  background: var(--rob-red);
  padding: 8px 28px 10px;
  border-radius: 8px;
  box-shadow: 0 6px 0 #8B0000, 0 8px 20px rgba(0,0,0,0.5);
  margin-bottom: 6px;
}
.logo-wrap h1 {
  font-family: 'Press Start 2P', monospace;
  font-size: 1.3rem;
  color: #fff;
  text-shadow: 2px 2px 0 #8B0000;
  line-height: 1.4;
}
header .tagline {
  font-size: 0.95rem; font-weight: 700;
  color: var(--rob-yellow);
  text-shadow: 1px 1px 0 rgba(0,0,0,0.5);
  margin-top: 4px;
}

/* ==============================
   SETUP SCREEN
   ============================== */
#screen-setup {
  max-width: 580px; margin: 0 auto;
  padding: 16px 14px 60px;
}

.rob-card {
  background: var(--rob-grey);
  border-radius: 12px;
  border: 2px solid var(--rob-light);
  padding: 22px;
  margin-top: 16px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}

.rob-card h2 {
  font-size: 1.05rem; font-weight: 800;
  color: var(--rob-yellow);
  margin-bottom: 14px;
  display: flex; align-items: center; gap: 8px;
  border-bottom: 2px solid var(--rob-light);
  padding-bottom: 10px;
}

.presets {
  display: flex; gap: 8px; flex-wrap: wrap;
  margin-bottom: 14px;
}
.preset-btn {
  padding: 7px 16px;
  border: 2px solid var(--rob-blue);
  border-radius: 8px;
  background: rgba(0,162,255,0.15);
  color: var(--rob-blue);
  font-family: 'Kanit', sans-serif;
  font-size: 0.88rem; font-weight: 700;
  cursor: pointer;
  transition: all .15s;
}
.preset-btn:hover { background: var(--rob-blue); color: #fff; }

.col-labels {
  display: grid;
  grid-template-columns: 1fr 1fr 34px;
  gap: 6px; margin-bottom: 6px;
}
.col-labels span {
  font-size: 0.72rem; font-weight: 700;
  color: #888; text-transform: uppercase; letter-spacing: 0.5px;
}

#word-list-container {
  display: flex; flex-direction: column; gap: 8px;
  margin-bottom: 12px;
}
.word-row {
  display: grid;
  grid-template-columns: 1fr 1fr 34px;
  gap: 6px; align-items: center;
  width: 100%;
}
.word-row input[type="text"] {
  width: 100%; min-width: 0;
  padding: 9px 10px;
  border: 2px solid var(--rob-light);
  border-radius: 8px;
  background: var(--rob-dark);
  color: var(--rob-white);
  font-family: 'Kanit', sans-serif;
  font-size: 0.9rem;
  outline: none;
  transition: border-color .15s;
}
.word-row input:focus { border-color: var(--rob-blue); }
.word-row input::placeholder { color: #555; }
.hint-inp { width: 100% !important; }

.btn-remove {
  width: 34px; height: 34px;
  border: none; border-radius: 6px;
  background: rgba(232,41,42,0.25);
  color: var(--rob-red); font-size: 1rem;
  cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s;
}
.btn-remove:hover { background: var(--rob-red); color: #fff; }

.btn-add-word {
  width: 100%; padding: 9px;
  border: 2px dashed var(--rob-light);
  border-radius: 8px; background: transparent;
  color: #777; font-family: 'Kanit', sans-serif;
  font-size: 0.9rem; font-weight: 600; cursor: pointer;
  transition: all .15s; margin-top: 4px;
}
.btn-add-word:hover { border-color: var(--rob-green); color: var(--rob-green); }

.btn-start {
  display: block; width: 100%; margin-top: 18px;
  padding: 16px; border: none; border-radius: 8px;
  background: var(--rob-red);
  box-shadow: 0 5px 0 #8B0000, 0 8px 20px rgba(232,41,42,0.4);
  color: #fff;
  font-family: 'Press Start 2P', monospace;
  font-size: 1rem; cursor: pointer;
  transition: transform .08s, box-shadow .08s;
  letter-spacing: 0.5px;
}
.btn-start:hover { transform: translateY(-2px); box-shadow: 0 7px 0 #8B0000, 0 12px 24px rgba(232,41,42,0.5); }
.btn-start:active { transform: translateY(4px); box-shadow: 0 1px 0 #8B0000; }

/* ==============================
   GAME SCREEN
   ============================== */
#screen-game {
  max-width: 720px; margin: 0 auto;
  padding: 14px 14px 50px;
}

.game-top-bar {
  display: flex; align-items: center;
  justify-content: space-between;
  margin-bottom: 14px; gap: 10px; flex-wrap: wrap;
}
.progress-pill {
  background: var(--rob-grey);
  border: 2px solid var(--rob-light);
  border-radius: 20px; padding: 5px 16px;
  font-weight: 700; color: var(--rob-yellow);
  font-size: 0.9rem;
}
.lives-display { display: flex; gap: 4px; align-items: center; }
.heart { font-size: 1.3rem; transition: transform .2s; display: inline-block; }
.heart.lost { opacity: 0.2; transform: scale(0.75); filter: grayscale(1); }

/* Roblox character canvas */
.char-wrap { text-align: center; margin: 6px 0; }

/* Hint box */
.hint-box {
  background: rgba(255,215,0,0.1);
  border: 2px solid rgba(255,215,0,0.4);
  border-radius: 10px; padding: 10px 18px;
  text-align: center; margin: 8px 0;
  font-size: 0.95rem; color: #FFE57F; font-weight: 600;
}
.hint-label { color: var(--rob-yellow); font-weight: 800; }

/* Translation popup */
.translation-banner {
  display: none;
  background: linear-gradient(135deg, rgba(0,200,83,0.2), rgba(0,162,255,0.2));
  border: 2px solid var(--rob-green);
  border-radius: 10px; padding: 10px 18px;
  text-align: center; margin: 6px 0;
  animation: slideIn .4s ease;
}
.translation-banner.show { display: block; }
@keyframes slideIn {
  from { opacity: 0; transform: scale(0.92); }
  to   { opacity: 1; transform: scale(1); }
}
.trans-label { color: var(--rob-green); font-weight: 800; font-size: 0.85rem; }
.trans-text  { color: #fff; font-size: 1.15rem; font-weight: 800; margin-top: 2px; }
.trans-loading { color: #aaa; font-size: 0.9rem; font-style: italic; }

/* Word display */
.word-display {
  display: flex; justify-content: center;
  gap: 7px; flex-wrap: wrap; margin: 12px 0;
}
.letter-box {
  width: 42px; height: 50px;
  border: 3px solid #555;
  border-radius: 6px;
  background: var(--rob-grey);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Press Start 2P', monospace;
  font-size: 1.1rem; color: var(--rob-yellow);
  transition: all .25s;
}
.letter-box.revealed {
  background: rgba(0,200,83,0.2);
  border-color: var(--rob-green);
  animation: popIn .3s ease;
}
.letter-box.wrong-reveal {
  background: rgba(232,41,42,0.25);
  border-color: var(--rob-red);
  color: #FF6B6B;
}
@keyframes popIn {
  0% { transform: scale(0.5) rotate(-10deg); }
  70% { transform: scale(1.2) rotate(5deg); }
  100% { transform: scale(1) rotate(0); }
}

/* Wrong letters */
.wrong-letters {
  text-align: center; font-size: 0.9rem;
  color: var(--rob-red); font-weight: 700;
  min-height: 26px; margin: 4px 0; letter-spacing: 3px;
}

/* Listen button */
.btn-listen {
  display: flex; align-items: center; gap: 8px;
  margin: 6px auto;
  padding: 10px 24px;
  background: var(--rob-purple);
  box-shadow: 0 4px 0 #6A1B8A;
  border: none; border-radius: 8px;
  color: #fff; font-family: 'Kanit', sans-serif;
  font-size: 1rem; font-weight: 800; cursor: pointer;
  transition: transform .08s, box-shadow .08s;
}
.btn-listen:hover { transform: translateY(-2px); box-shadow: 0 6px 0 #6A1B8A; }
.btn-listen:active { transform: translateY(3px); box-shadow: 0 1px 0 #6A1B8A; }

/* Keyboard */
.keyboard { display: flex; flex-direction: column; gap: 5px; margin: 8px 0; }
.key-row { display: flex; justify-content: center; gap: 4px; flex-wrap: wrap; }
.key {
  width: 38px; height: 40px;
  border: 2px solid #444;
  border-radius: 6px;
  background: var(--rob-grey);
  color: var(--rob-white);
  font-family: 'Kanit', sans-serif;
  font-size: 0.95rem; font-weight: 700;
  cursor: pointer;
  transition: all .12s;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 3px 0 #222;
}
.key:hover:not(:disabled) {
  background: var(--rob-blue); color: #fff;
  border-color: var(--rob-blue); transform: translateY(-2px);
  box-shadow: 0 5px 0 #005799;
}
.key:active:not(:disabled) { transform: translateY(2px); box-shadow: 0 1px 0 #222; }
.key:disabled { opacity: 0.35; cursor: not-allowed; transform: none; box-shadow: none; }
.key.correct { background: var(--rob-green); border-color: #00873A; color: #fff; box-shadow: 0 3px 0 #005A27; }
.key.wrong   { background: rgba(232,41,42,0.35); border-color: var(--rob-red); color: #FF8A8A; box-shadow: none; }

/* ==============================
   RESULT OVERLAY
   ============================== */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.75); z-index: 200;
  align-items: center; justify-content: center; padding: 20px;
}
.overlay.show { display: flex; }
.result-card {
  background: var(--rob-grey);
  border: 3px solid var(--rob-light);
  border-radius: 16px; padding: 28px 24px;
  max-width: 400px; width: 100%; text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  animation: popIn .35s ease;
}
.result-emoji { font-size: 3.5rem; margin-bottom: 8px; }
.result-title {
  font-family: 'Press Start 2P', monospace;
  font-size: 1.1rem; margin-bottom: 10px; line-height: 1.5;
}
.result-word { font-size: 1rem; color: #aaa; margin-bottom: 6px; }
.result-word strong { color: var(--rob-yellow); font-size: 1.4rem; font-family: 'Press Start 2P', monospace; }
.result-trans { font-size: 1rem; color: var(--rob-green); font-weight: 800; margin-bottom: 4px; min-height: 24px; }
.result-btns { display: flex; flex-direction: column; gap: 10px; margin-top: 18px; }
.btn-next {
  padding: 13px; border: none; border-radius: 8px;
  background: var(--rob-green); box-shadow: 0 4px 0 #005A27;
  color: #fff; font-family: 'Kanit', sans-serif;
  font-size: 1.05rem; font-weight: 800; cursor: pointer;
  transition: transform .08s;
}
.btn-next:hover { transform: translateY(-2px); }
.btn-next:active { transform: translateY(3px); }
.btn-quit-review {
  padding: 13px; border: 2px solid var(--rob-yellow); border-radius: 8px;
  background: transparent; color: var(--rob-yellow);
  font-family: 'Kanit', sans-serif; font-size: 1rem;
  font-weight: 800; cursor: pointer; transition: all .12s;
}
.btn-quit-review:hover { background: var(--rob-yellow); color: var(--rob-dark); }

/* ==============================
   REVIEW SCREEN
   ============================== */
#screen-review {
  max-width: 600px; margin: 0 auto;
  padding: 16px 14px 60px;
}
.review-header { text-align: center; margin: 16px 0 20px; }
.review-header h2 {
  font-family: 'Press Start 2P', monospace;
  font-size: 1rem; color: var(--rob-yellow);
  line-height: 1.6; margin-bottom: 6px;
}
.review-header p { color: #aaa; font-size: 0.9rem; }

.score-banner {
  background: linear-gradient(135deg, #1A1A1A, var(--rob-grey));
  border: 3px solid var(--rob-yellow);
  border-radius: 14px; padding: 18px;
  text-align: center; margin-bottom: 20px;
  box-shadow: 0 0 30px rgba(255,215,0,0.15);
}
.score-banner .big-score {
  font-family: 'Press Start 2P', monospace;
  font-size: 2.5rem; color: var(--rob-yellow);
  text-shadow: 2px 2px 0 rgba(0,0,0,0.5);
}
.score-banner p { color: #bbb; font-size: 0.9rem; margin-top: 6px; font-weight: 700; }

#wrong-words-section .review-header h2 { color: var(--rob-red); }

.review-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 22px; }
.review-item {
  background: var(--rob-grey);
  border: 2px solid var(--rob-light);
  border-radius: 12px; padding: 16px 16px;
  display: flex; align-items: flex-start; gap: 12px;
}
.rv-num {
  width: 34px; height: 34px; border-radius: 6px;
  background: var(--rob-red);
  color: #fff; font-family: 'Press Start 2P', monospace;
  font-size: 0.75rem;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 2px;
}
.rv-content { flex: 1; }
.rv-word {
  font-family: 'Press Start 2P', monospace;
  font-size: 1rem; color: var(--rob-yellow);
  letter-spacing: 2px; margin-bottom: 3px;
}
.rv-hint { font-size: 0.82rem; color: #888; margin-bottom: 3px; }
.rv-translation { font-size: 0.9rem; color: var(--rob-green); font-weight: 700; margin-bottom: 8px; }

.practice-area {
  background: rgba(0,0,0,0.3);
  border: 1px solid var(--rob-light);
  border-radius: 8px; padding: 12px 14px; margin-top: 8px;
}
.practice-area p { font-size: 0.82rem; color: #aaa; font-weight: 600; margin-bottom: 8px; }
.practice-input-row { display: flex; gap: 8px; }
.practice-input-row input {
  flex: 1; padding: 8px 12px;
  border: 2px solid var(--rob-light); border-radius: 6px;
  background: var(--rob-dark); color: var(--rob-white);
  font-family: 'Kanit', sans-serif; font-size: 0.95rem; outline: none;
}
.practice-input-row input:focus { border-color: var(--rob-blue); }
.btn-check-practice {
  padding: 8px 14px; border: none; border-radius: 6px;
  background: var(--rob-blue); color: #fff;
  font-family: 'Kanit', sans-serif; font-weight: 800; cursor: pointer;
  font-size: 0.88rem; transition: background .15s;
}
.btn-check-practice:hover { background: #0082CC; }
.practice-feedback { margin-top: 6px; font-size: 0.88rem; font-weight: 700; min-height: 20px; }
.practice-feedback.ok  { color: var(--rob-green); }
.practice-feedback.err { color: var(--rob-red); }

.btn-listen-rv {
  background: rgba(176,57,212,0.25); border: 2px solid var(--rob-purple);
  color: var(--rob-purple); border-radius: 8px;
  padding: 6px 12px; font-family: 'Kanit', sans-serif;
  font-weight: 700; cursor: pointer; font-size: 0.82rem;
  transition: all .15s; flex-shrink: 0; margin-top: 2px;
}
.btn-listen-rv:hover { background: var(--rob-purple); color: #fff; }

.btn-play-again {
  display: block; width: 100%; padding: 16px; border: none;
  border-radius: 8px; background: var(--rob-red);
  box-shadow: 0 5px 0 #8B0000;
  color: #fff; font-family: 'Press Start 2P', monospace;
  font-size: 0.95rem; cursor: pointer;
  transition: transform .08s, box-shadow .08s;
}
.btn-play-again:hover { transform: translateY(-2px); box-shadow: 0 7px 0 #8B0000; }
.btn-play-again:active { transform: translateY(4px); box-shadow: 0 1px 0 #8B0000; }

/* Shake */
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20% { transform: translateX(-8px); }
  40% { transform: translateX(8px); }
  60% { transform: translateX(-6px); }
  80% { transform: translateX(6px); }
}
.shake { animation: shake .4s ease; }

/* Confetti */
.confetti-piece {
  position: fixed; width: 10px; height: 10px;
  border-radius: 2px; opacity: 0;
  animation: confettiFall 1s ease forwards;
  z-index: 300; pointer-events: none;
}
@keyframes confettiFall {
  0%  { transform: translateY(-20px) rotate(0); opacity: 1; }
  100%{ transform: translateY(80vh) rotate(720deg); opacity: 0; }
}

/* Responsive */
@media (max-width: 480px) {
  .logo-wrap h1 { font-size: 0.95rem; }
  .key { width: 32px; height: 36px; font-size: 0.85rem; }
  .letter-box { width: 36px; height: 44px; font-size: 0.9rem; }
}
</style>
</head>
<body>

<div class="pixel-floats" id="pf"></div>

<!-- ========== SETUP SCREEN ========== -->
<div id="screen-setup" class="screen active">
  <header>
    <div class="logo-wrap">
      <h1>🎮 WORD QUEST</h1>
    </div>
    <p class="tagline">ฝึกสะกดคำสไตล์ Roblox! 🟥</p>
  </header>

  <div id="screen-setup-inner" style="max-width:580px;margin:0 auto;padding:12px 14px 60px;">
    <div class="rob-card">
      <h2>⚡ ชุดคำศัพท์สำเร็จ</h2>
      <div class="presets">
        <button class="preset-btn" onclick="loadPreset('animals')">🐾 สัตว์</button>
        <button class="preset-btn" onclick="loadPreset('fruits')">🍎 ผลไม้</button>
        <button class="preset-btn" onclick="loadPreset('colors')">🎨 สี</button>
        <button class="preset-btn" onclick="loadPreset('school')">🎒 โรงเรียน</button>
        <button class="preset-btn" onclick="loadPreset('roblox')">🟥 Roblox</button>
      </div>
    </div>

    <div class="rob-card">
      <h2>✏️ ใส่คำศัพท์เอง</h2>
      <div class="col-labels">
        <span class="lbl-word">คำศัพท์ (EN)</span>
        <span class="lbl-hint">คำใบ้ (ไทย)</span>
        <span class="lbl-del"></span>
      </div>
      <div id="word-list-container"></div>
      <button class="btn-add-word" onclick="addWordRow()">＋ เพิ่มคำศัพท์</button>
      <button class="btn-start" onclick="startGame()">▶ START GAME!</button>
    </div>
  </div>
</div>

<!-- ========== GAME SCREEN ========== -->
<div id="screen-game" class="screen">
  <header>
    <div class="logo-wrap">
      <h1>🎮 WORD QUEST</h1>
    </div>
  </header>

  <div id="game-area" style="max-width:720px;margin:10px auto 0;padding:0 12px;">
    <div class="game-top-bar">
      <div class="progress-pill" id="progress-pill">WORD 1/5</div>
      <div class="lives-display" id="lives-display"></div>
    </div>

    <!-- Roblox character canvas -->
    <div class="char-wrap">
      <canvas id="rob-canvas" width="180" height="200"></canvas>
    </div>

    <!-- Hint -->
    <div class="hint-box" id="hint-box">
      <span class="hint-label">💡 คำใบ้: </span><span id="hint-text">—</span>
    </div>

    <!-- Translation (shows when word complete) -->
    <div class="translation-banner" id="trans-banner">
      <div class="trans-label">✅ แปลว่า:</div>
      <div class="trans-text" id="trans-text"></div>
    </div>

    <!-- Listen button -->
    <div style="text-align:center;margin:6px 0;">
      <button class="btn-listen" onclick="speakWord()">
        🔊 ฟังเสียงคำศัพท์
      </button>
    </div>

    <!-- Word display -->
    <div class="word-display" id="word-display"></div>

    <!-- Wrong letters -->
    <div class="wrong-letters" id="wrong-letters"></div>

    <!-- Keyboard -->
    <div class="keyboard" id="keyboard"></div>
  </div>
</div>

<!-- ========== REVIEW SCREEN ========== -->
<div id="screen-review" class="screen">
  <header>
    <div class="logo-wrap"><h1>🎮 WORD QUEST</h1></div>
  </header>
  <div id="screen-review-inner">
    <div class="review-header" style="margin-top:20px;">
      <h2>GAME OVER!</h2>
      <p id="review-subtitle"></p>
    </div>
    <div class="score-banner">
      <div class="big-score" id="final-score-display">0/0</div>
      <p>คำที่สะกดถูก 🏆</p>
    </div>
    <div id="wrong-words-section" style="display:none;">
      <div class="review-header">
        <h2>❌ ทบทวนคำที่สะกดผิด</h2>
        <p>ลองพิมพ์ให้ถูกต้องดูสิ!</p>
      </div>
      <div class="review-list" id="review-list"></div>
    </div>
    <div style="max-width:580px;margin:0 auto;padding:0 14px;">
      <button class="btn-play-again" onclick="backToSetup()">🔄 PLAY AGAIN!</button>
    </div>
  </div>
</div>

<!-- Result Overlay -->
<div class="overlay" id="result-overlay">
  <div class="result-card">
    <div class="result-emoji" id="result-emoji"></div>
    <div class="result-title" id="result-title"></div>
    <div class="result-word" id="result-word-display"></div>
    <div class="result-trans" id="result-trans-display"></div>
    <div class="result-btns">
      <button class="btn-next" id="btn-next-word" onclick="nextWord()">ต่อไป ▶</button>
      <button class="btn-quit-review" onclick="goToReview()">🏁 ดูสรุปผล</button>
    </div>
  </div>
</div>

<script>
// ============================================================
//  PRESETS
// ============================================================
const PRESETS = {
  animals: [
    {word:'CAT',hint:'สัตว์ที่ร้องเมี้ยว'},{word:'DOG',hint:'สัตว์เลี้ยงที่ซื่อสัตย์'},
    {word:'FISH',hint:'สัตว์ที่อยู่ในน้ำ'},{word:'BIRD',hint:'สัตว์ที่บินได้'},
    {word:'LION',hint:'ราชาแห่งป่า'},{word:'FROG',hint:'สัตว์ที่กระโดด'},
    {word:'BEAR',hint:'สัตว์ขนฟูชอบน้ำผึ้ง'}
  ],
  fruits: [
    {word:'APPLE',hint:'ผลไม้สีแดงกรอบ'},{word:'MANGO',hint:'ผลไม้สีเหลืองหวาน'},
    {word:'GRAPE',hint:'ผลไม้เป็นพวง'},{word:'LEMON',hint:'ผลไม้รสเปรี้ยว'},
    {word:'MELON',hint:'ผลไม้เนื้อสีเขียว'},{word:'PEACH',hint:'ผลไม้นุ่มมีขน'}
  ],
  colors: [
    {word:'RED',hint:'สีเดียวกับ Roblox'},{word:'BLUE',hint:'สีท้องฟ้า'},
    {word:'GREEN',hint:'สีใบไม้'},{word:'PINK',hint:'สีดอกไม้หวาน'},
    {word:'WHITE',hint:'สีหิมะ'},{word:'BLACK',hint:'สีกลางคืน'},
    {word:'PURPLE',hint:'สีม่วงสีลูกพลัม'}
  ],
  school: [
    {word:'BOOK',hint:'อ่านเพื่อเรียนรู้'},{word:'PEN',hint:'ใช้เขียนสีน้ำเงิน'},
    {word:'DESK',hint:'ที่วางของนักเรียน'},{word:'RULER',hint:'ใช้ขีดเส้นตรง'},
    {word:'CLASS',hint:'ห้องที่เรียนหนังสือ'},{word:'PENCIL',hint:'เขียนแล้วลบได้'}
  ],
  roblox: [
    {word:'BUILD',hint:'สร้างโลกในเกม'},{word:'SWORD',hint:'อาวุธฟันในเกม'},
    {word:'TRADE',hint:'แลกของกับเพื่อน'},{word:'BADGE',hint:'รางวัลพิเศษในเกม'},
    {word:'AVATAR',hint:'ตัวละครของเรา'},{word:'ROBUX',hint:'เงินในเกม Roblox'},
    {word:'SERVER',hint:'ห้องที่เล่นเกมด้วยกัน'}
  ]
};

// ============================================================
//  STATE
// ============================================================
const MAX_WRONG = 5;
let wordList = [], currentIdx = 0;
let currentWord = '', currentHint = '';
let guessed = new Set(), wrongCount = 0;
let wrongWords = [], score = 0;
let translationCache = {};

// ============================================================
//  BG PIXEL BLOCKS
// ============================================================
(function() {
  const colors = ['#E8292A','#00A2FF','#FFD700','#00C853','#B039D4'];
  const container = document.getElementById('pf');
  for (let i = 0; i < 20; i++) {
    const b = document.createElement('div');
    b.className = 'pblock';
    const s = 16 + Math.random() * 40;
    b.style.cssText = `width:${s}px;height:${s}px;left:${Math.random()*100}%;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-duration:${12+Math.random()*18}s;
      animation-delay:${Math.random()*12}s;border-radius:4px;`;
    container.appendChild(b);
  }
})();

// ============================================================
//  SETUP
// ============================================================
function addWordRow(word='', hint='') {
  const c = document.getElementById('word-list-container');
  const r = document.createElement('div');
  r.className = 'word-row';
  r.innerHTML = `
    <input type="text" class="word-input" placeholder="เช่น SWORD" value="${word}" oninput="this.value=this.value.toUpperCase()">
    <input type="text" class="hint-inp" placeholder="คำใบ้ภาษาไทย" value="${hint}">
    <button class="btn-remove" onclick="this.parentElement.remove()">✕</button>`;
  c.appendChild(r);
}

function loadPreset(key) {
  document.getElementById('word-list-container').innerHTML = '';
  PRESETS[key].forEach(({word,hint}) => addWordRow(word, hint));
}

function startGame() {
  const rows = document.querySelectorAll('#word-list-container .word-row');
  const words = [];
  rows.forEach(r => {
    const w = r.querySelector('.word-input').value.trim().toUpperCase();
    const h = r.querySelector('.hint-inp').value.trim();
    if (w && /^[A-Z]+$/.test(w)) words.push({word:w, hint:h||'?'});
  });
  if (!words.length) { alert('กรุณาใส่คำศัพท์อย่างน้อย 1 คำก่อนนะ! 😊'); return; }
  wordList = shuffle(words);
  currentIdx = 0; wrongWords = []; score = 0; translationCache = {};
  showScreen('screen-game');
  loadWord();
}

function shuffle(a) {
  const b = [...a];
  for (let i = b.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1)); [b[i],b[j]]=[b[j],b[i]];
  }
  return b;
}

// ============================================================
//  ROBLOX CHARACTER CANVAS
// ============================================================
function drawRobloxChar(wrongCnt) {
  const canvas = document.getElementById('rob-canvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 180, 200);

  const isDead = wrongCnt >= MAX_WRONG;
  const bodyColor = isDead ? '#8B0000' : '#E8292A';
  const pantsColor = isDead ? '#333' : '#1A1A6E';
  const skinColor  = isDead ? '#C9A08A' : '#FFD5B0';
  const cx = 90;

  // === NOOSE / ROPE (always visible) ===
  ctx.strokeStyle = '#888'; ctx.lineWidth = 3; ctx.lineCap = 'round';
  // Gallows post (top)
  ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, 30); ctx.stroke();

  // Show rope dangling based on wrong count
  const ropeLen = [0,15,28,38,46,55][Math.min(wrongCnt, 5)];
  if (ropeLen > 0) {
    ctx.beginPath(); ctx.moveTo(cx, 30); ctx.lineTo(cx, 30+ropeLen); ctx.stroke();
  }

  // === CHARACTER (always present) ===
  // Head
  const headY = 94;
  ctx.fillStyle = skinColor;
  ctx.fillRect(cx-20, headY-20, 40, 40);
  // Eyes
  if (isDead) {
    // X eyes
    ctx.strokeStyle = '#333'; ctx.lineWidth = 2.5;
    [[cx-12,headY-8],[cx+8,headY-8]].forEach(([ex,ey]) => {
      ctx.beginPath(); ctx.moveTo(ex-4,ey-4); ctx.lineTo(ex+4,ey+4); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(ex+4,ey-4); ctx.lineTo(ex-4,ey+4); ctx.stroke();
    });
  } else if (wrongCnt >= 3) {
    // Worried eyes (raised inner brows)
    ctx.fillStyle = '#333';
    ctx.fillRect(cx-14, headY-8, 8, 9);
    ctx.fillRect(cx+6, headY-8, 8, 9);
    // worried brow
    ctx.strokeStyle='#5D3E30'; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.moveTo(cx-16,headY-14); ctx.lineTo(cx-6,headY-12); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx+6,headY-12); ctx.lineTo(cx+16,headY-14); ctx.stroke();
  } else {
    ctx.fillStyle = '#333';
    ctx.fillRect(cx-14, headY-8, 8, 9);
    ctx.fillRect(cx+6, headY-8, 8, 9);
  }
  // Mouth
  ctx.strokeStyle='#5D3E30'; ctx.lineWidth=2; ctx.lineCap='round';
  ctx.beginPath();
  if (isDead || wrongCnt >= 2) {
    ctx.moveTo(cx-8,headY+10); ctx.quadraticCurveTo(cx,headY+6,cx+8,headY+10);
  } else {
    ctx.moveTo(cx-8,headY+8); ctx.quadraticCurveTo(cx,headY+14,cx+8,headY+8);
  }
  ctx.stroke();

  // Body
  ctx.fillStyle = bodyColor;
  ctx.fillRect(cx-22, headY+20, 44, 46);

  // Roblox logo on shirt
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.fillRect(cx-10, headY+28, 20, 14);
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.font='bold 8px Arial'; ctx.textAlign='center';
  ctx.fillText('R', cx, headY+39);

  // Pants
  ctx.fillStyle = pantsColor;
  ctx.fillRect(cx-22, headY+58, 20, 36);
  ctx.fillRect(cx+2,  headY+58, 20, 36);

  // Shoes
  ctx.fillStyle = '#111';
  ctx.fillRect(cx-24, headY+90, 22, 10);
  ctx.fillRect(cx+2,  headY+90, 22, 10);

  // Arms — reveal based on wrong count
  if (wrongCnt >= 1) {
    // Left arm (hangs limp if dead)
    ctx.fillStyle = skinColor;
    if (isDead) {
      ctx.save(); ctx.translate(cx-22, headY+26);
      ctx.rotate(0.6);
      ctx.fillRect(-8, 0, 12, 40); ctx.restore();
    } else {
      ctx.fillRect(cx-38, headY+22, 16, 38);
    }
    // Sleeve
    ctx.fillStyle = bodyColor;
    ctx.fillRect(cx-38, headY+22, 16, 10);
  }
  if (wrongCnt >= 2) {
    ctx.fillStyle = skinColor;
    if (isDead) {
      ctx.save(); ctx.translate(cx+22, headY+26);
      ctx.rotate(-0.6);
      ctx.fillRect(-4, 0, 12, 40); ctx.restore();
    } else {
      ctx.fillRect(cx+22, headY+22, 16, 38);
    }
    ctx.fillStyle = bodyColor;
    ctx.fillRect(cx+22, headY+22, 16, 10);
  }

  // Sweat drops (1–4 wrong)
  if (wrongCnt >= 1 && !isDead) {
    ctx.fillStyle='#81D4FA';
    ctx.beginPath(); ctx.arc(cx+30, headY-10, 5, 0, Math.PI*2); ctx.fill();
    if (wrongCnt>=3) { ctx.beginPath(); ctx.arc(cx+36, headY+2, 3, 0, Math.PI*2); ctx.fill(); }
  }

  // Hat (noose tight when dead)
  if (!isDead) {
    ctx.fillStyle='#FFD700';
    ctx.fillRect(cx-16, headY-30, 32, 12);
    ctx.fillRect(cx-10, headY-44, 20, 16);
  }
}

// ============================================================
//  CLAUDE API — TRANSLATION
// ============================================================
async function translateWord(word) {
  if (translationCache[word]) return translationCache[word];
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 60,
        system: 'You are a Thai-English translator for children. When given an English word, respond ONLY with the Thai translation. No punctuation, no explanation, no romanization. Just the Thai word(s). Example: CAT → แมว',
        messages: [{ role: 'user', content: word }]
      })
    });
    const data = await res.json();
    const thai = data?.content?.[0]?.text?.trim() || '—';
    translationCache[word] = thai;
    return thai;
  } catch(e) {
    return '—';
  }
}

// ============================================================
//  GAME LOGIC
// ============================================================
function loadWord() {
  if (currentIdx >= wordList.length) { goToReview(); return; }
  const item = wordList[currentIdx];
  currentWord = item.word; currentHint = item.hint;
  guessed = new Set(); wrongCount = 0;

  document.getElementById('progress-pill').textContent =
    `WORD ${currentIdx+1}/${wordList.length}`;
  document.getElementById('hint-text').textContent = currentHint;
  document.getElementById('trans-banner').classList.remove('show');
  document.getElementById('trans-text').textContent = '';

  renderLives(); renderWordDisplay(); renderKeyboard(); renderWrongLetters();
  drawRobloxChar(0);
}

function renderLives() {
  const el = document.getElementById('lives-display');
  let h = '';
  for (let i=0; i<MAX_WRONG; i++)
    h += `<span class="heart ${i>=(MAX_WRONG-wrongCount)?'lost':''}">❤️</span>`;
  el.innerHTML = h;
}

function renderWordDisplay() {
  const el = document.getElementById('word-display');
  el.innerHTML = currentWord.split('').map(l => {
    const rev = guessed.has(l);
    return `<div class="letter-box ${rev?'revealed':''}">${rev?l:''}</div>`;
  }).join('');
}

function renderKeyboard() {
  const kb = document.getElementById('keyboard');
  const rows = ['QWERTYUIOP'.split(''),'ASDFGHJKL'.split(''),'ZXCVBNM'.split('')];
  kb.innerHTML = rows.map(row =>
    `<div class="key-row">${row.map(l => {
      let cls = guessed.has(l) ? (currentWord.includes(l)?'correct':'wrong') : '';
      return `<button class="key ${cls}" id="key-${l}" onclick="guessLetter('${l}')"
        ${guessed.has(l)?'disabled':''}>${l}</button>`;
    }).join('')}</div>`
  ).join('');
}

function renderWrongLetters() {
  const w = [...guessed].filter(l => !currentWord.includes(l));
  document.getElementById('wrong-letters').textContent =
    w.length ? '✗ '+w.join('  ') : '';
}

async function guessLetter(letter) {
  if (guessed.has(letter)) return;
  guessed.add(letter);
  const btn = document.getElementById('key-'+letter);

  if (currentWord.includes(letter)) {
    if (btn) { btn.disabled=true; btn.classList.add('correct'); }
    renderWordDisplay();

    const allRevealed = currentWord.split('').every(l => guessed.has(l));
    if (allRevealed) {
      score++;
      // Show translation banner
      const banner = document.getElementById('trans-banner');
      const transEl = document.getElementById('trans-text');
      transEl.innerHTML = '<span class="trans-loading">กำลังแปล...</span>';
      banner.classList.add('show');
      const thai = await translateWord(currentWord);
      transEl.textContent = thai;
      setTimeout(() => showResult(true, thai), 700);
    }
  } else {
    wrongCount++;
    if (btn) { btn.disabled=true; btn.classList.add('wrong'); }
    drawRobloxChar(wrongCount);
    renderLives(); renderWrongLetters();
    const wd = document.getElementById('word-display');
    wd.classList.remove('shake'); void wd.offsetWidth; wd.classList.add('shake');

    if (wrongCount >= MAX_WRONG) {
      // Reveal full word
      document.getElementById('word-display').innerHTML =
        currentWord.split('').map(l =>
          `<div class="letter-box ${guessed.has(l)?'revealed':'wrong-reveal'}">${l}</div>`
        ).join('');
      // Get translation for wrong too
      const thai = await translateWord(currentWord);
      wrongWords.push({word:currentWord, hint:currentHint, translation:thai});
      setTimeout(() => showResult(false, thai), 600);
    }
  }
}

async function showResult(isWin, thai) {
  const overlay = document.getElementById('result-overlay');
  document.getElementById('result-emoji').textContent = isWin ? '🎉' : '💀';
  document.getElementById('result-title').textContent = isWin ? 'NICE!' : 'OOPS!';
  document.getElementById('result-title').style.color = isWin ? '#00C853' : '#E8292A';
  document.getElementById('result-word-display').innerHTML =
    `คำนี้คือ: <strong>${currentWord}</strong>`;

  // Show translation in overlay
  const transEl = document.getElementById('result-trans-display');
  if (thai && thai !== '—') {
    transEl.textContent = `แปลว่า: ${thai}`;
  } else if (isWin) {
    transEl.textContent = 'กำลังโหลดคำแปล...';
    const t = await translateWord(currentWord);
    transEl.textContent = t !== '—' ? `แปลว่า: ${t}` : '';
  } else {
    transEl.textContent = '';
  }

  const btnNext = document.getElementById('btn-next-word');
  btnNext.textContent = currentIdx+1 >= wordList.length ? '🏁 ดูสรุปผล' : 'ต่อไป ▶';
  overlay.classList.add('show');
  if (isWin) launchConfetti();
}

function nextWord() {
  document.getElementById('result-overlay').classList.remove('show');
  currentIdx++;
  currentIdx >= wordList.length ? goToReview() : loadWord();
}

function goToReview() {
  document.getElementById('result-overlay').classList.remove('show');
  buildReviewScreen(); showScreen('screen-review');
}

// ============================================================
//  REVIEW SCREEN
// ============================================================
function buildReviewScreen() {
  const total = wordList.length, correct = score;
  document.getElementById('final-score-display').textContent = `${correct}/${total}`;
  document.getElementById('review-subtitle').textContent =
    correct===total ? '🌟 PERFECT! สะกดถูกทุกคำ!' :
    correct>=total*.7 ? '👏 GREAT JOB! ทบทวนคำที่ผิดด้วยนะ' :
    '💪 KEEP GOING! ฝึกอีกนิดก็เก่งแน่!';

  const ws = document.getElementById('wrong-words-section');
  const listEl = document.getElementById('review-list');
  listEl.innerHTML = '';

  if (wrongWords.length > 0) {
    ws.style.display = 'block';
    wrongWords.forEach((item, idx) => {
      const div = document.createElement('div');
      div.className = 'review-item';
      const pId = `pfb-${idx}`;
      div.innerHTML = `
        <div class="rv-num">${idx+1}</div>
        <div class="rv-content">
          <div class="rv-word">${item.word}</div>
          <div class="rv-hint">💡 ${item.hint}</div>
          <div class="rv-translation">🇹🇭 แปลว่า: ${item.translation||'—'}</div>
          <div class="practice-area">
            <p>✏️ ลองพิมพ์คำนี้ให้ถูก:</p>
            <div class="practice-input-row">
              <input type="text" id="pi-${idx}" placeholder="${'_'.repeat(item.word.length)}"
                oninput="this.value=this.value.toUpperCase()"
                onkeydown="if(event.key==='Enter')checkPractice(${idx},'${item.word}')">
              <button class="btn-check-practice" onclick="checkPractice(${idx},'${item.word}')">CHECK ✓</button>
            </div>
            <div class="practice-feedback" id="${pId}"></div>
          </div>
        </div>
        <button class="btn-listen-rv" onclick="speakText('${item.word}')">🔊 ฟัง</button>`;
      listEl.appendChild(div);
    });
  } else {
    ws.style.display = 'none';
  }
}

function checkPractice(idx, word) {
  const inp = document.getElementById(`pi-${idx}`);
  const fb  = document.getElementById(`pfb-${idx}`);
  const val = inp.value.trim().toUpperCase();
  if (val===word) {
    fb.textContent='✅ ถูกต้อง! NICE!'; fb.className='practice-feedback ok';
    inp.style.borderColor='#00C853'; speakText('Nice job!');
  } else if (!val) {
    fb.textContent='⚠️ กรุณาพิมพ์คำก่อนนะ'; fb.className='practice-feedback err';
  } else {
    fb.textContent=`❌ ยังไม่ถูก คำที่ถูกคือ "${word}"`; fb.className='practice-feedback err';
    inp.style.borderColor='#E8292A'; inp.value='';
    setTimeout(()=>{inp.style.borderColor='';}, 1500);
  }
}

// ============================================================
//  TTS
// ============================================================
function speakWord() { speakText(currentWord); }
function speakText(text) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang='en-US'; u.rate=0.85; u.pitch=1.1;
  speechSynthesis.speak(u);
}

// ============================================================
//  CONFETTI (Roblox colors)
// ============================================================
function launchConfetti() {
  const colors=['#E8292A','#00A2FF','#FFD700','#00C853','#B039D4','#FF6D00'];
  for(let i=0;i<45;i++) setTimeout(()=>{
    const c=document.createElement('div'); c.className='confetti-piece';
    c.style.cssText=`left:${10+Math.random()*80}%;top:0;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      width:${6+Math.random()*10}px;height:${6+Math.random()*10}px;
      animation-duration:${0.8+Math.random()*0.8}s;
      animation-delay:${Math.random()*0.4}s;
      border-radius:${Math.random()>.5?'50%':'2px'};`;
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),1600);
  }, i*28);
}

// ============================================================
//  NAV
// ============================================================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}
function backToSetup() { showScreen('screen-setup'); }

// ============================================================
//  INIT
// ============================================================
window.onload = () => loadPreset('roblox');
</script>
